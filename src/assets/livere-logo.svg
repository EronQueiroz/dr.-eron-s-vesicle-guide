<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" role="img" aria-label="Logo Clínica Lívere">
  <!-- Pássaro estilizado em voo (duas asas curvas + corpo discreto), inspirado no logo Lívere -->
  <g fill="currentColor">
    <!-- Asa esquerda -->
    <path d="M100 70
             C 92 56, 78 44, 56 40
             C 70 50, 80 60, 86 72
             C 80 70, 72 70, 64 74
             C 78 76, 90 78, 100 80 Z" />
    <!-- Asa direita (espelhada) -->
    <path d="M100 70
             C 108 56, 122 44, 144 40
             C 130 50, 120 60, 114 72
             C 120 70, 128 70, 136 74
             C 122 76, 110 78, 100 80 Z" />
    <!-- Corpo / cauda do pássaro -->
    <path d="M96 76
             C 96 86, 98 94, 100 100
             C 102 94, 104 86, 104 76
             C 102 74, 98 74, 96 76 Z" />
  </g>
  <!-- Wordmark LÍVERE -->
  <text x="100" y="148"
        font-family="'Cormorant Garamond', 'Playfair Display', Georgia, serif"
        font-weight="500"
        font-size="38"
        letter-spacing="6"
        text-anchor="middle"
        fill="currentColor">LÍVERE</text>
  <!-- Régua sutil -->
  <line x1="58" y1="166" x2="142" y2="166" stroke="currentColor" stroke-width="0.6" opacity="0.45" />
  <!-- Tagline -->
  <text x="100" y="184"
        font-family="'Inter', system-ui, sans-serif"
        font-weight="500"
        font-size="6.2"
        letter-spacing="2.2"
        text-anchor="middle"
        fill="currentColor"
        opacity="0.7">LIBERDADE PARA VIVER COM SAÚDE</text>
</svg>
